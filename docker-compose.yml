services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eventy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: karim
      POSTGRES_PASSWORD: 123123123
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karim -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./nestjs
      dockerfile: Dockerfile
    container_name: eventy_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://karim:123123123@postgres:5432/mydb?schema=eventy
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./nestjs:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev

  # ─── React / Vite Frontend ─────────────────────────────────────────────────
  web:
    build:
      context: ./reactjs
      dockerfile: Dockerfile
    container_name: eventy_web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./reactjs:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
